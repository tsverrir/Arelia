services:
  arelia:
    image: ghcr.io/sverrir-asmundsson/arelia:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ${DATA_PATH:-/var/lib/areliacms}:/data
    environment:
      # Database — stored inside the /data volume
      - ConnectionStrings__DefaultConnection=DataSource=/data/arelia.db;Cache=Shared
      # File uploads — stored inside the /data volume
      - FileStorage__BasePath=/data/uploads
      # Seed admin credentials — CHANGE THESE before first run
      - Seed__AdminEmail=admin@arelia.dev
      - Seed__AdminPassword=Admin123!
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Watchtower — polls ghcr.io every 5 minutes and restarts arelia when a new image is pushed.
  # Requires ~/.docker/config.json on the host to already contain ghcr.io credentials
  # (run: echo YOUR_PAT | docker login ghcr.io -u YOUR_GITHUB_USERNAME --password-stdin)
  # Start with: docker compose --profile production up -d
  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    profiles: ["production"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.docker/config.json:/config.json:ro
    environment:
      - DOCKER_CONFIG=/config.json
    command: --label-enable --cleanup --interval 300

  # Cloudflare Tunnel — exposes arelia publicly over HTTPS without opening firewall ports.
  #
  # Setup (one-time):
  #   1. Create a tunnel in the Cloudflare Zero Trust dashboard (Network → Tunnels → Create tunnel).
  #   2. Set the tunnel's public hostname ingress rule to: http://arelia:8080
  #   3. Copy the tunnel token and set it in a .env file:  CLOUDFLARE_TUNNEL_TOKEN=<token>
  #
  # Blazor Server / SignalR notes:
  #   • Cloudflare Tunnels forward WebSocket connections natively; no special config needed.
  #   • The app reads X-Forwarded-For / X-Forwarded-Proto set by Cloudflare so that HTTPS is
  #     detected correctly, Secure cookie flags are applied, and redirect URIs are correct.
  #   • WebSocket idle timeout on Cloudflare is 100 s; Blazor keep-alive pings (every 15 s)
  #     keep the connection alive well within that window.
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles: ["production"]
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - arelia

